services:
  - type: web
    name: parking-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      # ⚠️ Значения ниже лучше задавать через Dashboard, но для документации:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: SHEET_NAME
        value: "Лист1"
      - key: GOOGLE_CREDS_JSON
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: parking-bot
          property: host
healthCheckPath: /health
